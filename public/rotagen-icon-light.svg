<svg width="512" height="512" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RotaGen Icon — T left/flat into blue, bigger tabs, grid centred -->
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="130" height="130" rx="30"/>
    </clipPath>
    <clipPath id="calendar">
      <rect x="17" y="17" width="96" height="96" rx="22"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="130" height="130" fill="#2563EB"/>
    <rect x="17" y="17" width="96" height="96" rx="22" fill="white"/>
    <g clip-path="url(#calendar)">
      <rect x="17" y="17" width="96" height="18" fill="#dbeafe"/>
    </g>

    <!-- tabs: bigger (11×17 rx5) and same spread (x=43 / x=79) -->
    <rect x="43" y="9"  width="11" height="17" rx="5" fill="#2563EB"/>
    <rect x="79" y="9"  width="11" height="17" rx="5" fill="#2563EB"/>

    <!-- grid: centred in white area (y=39–113, 74px).
         Grid height 56px → top margin 9px → rows at y=48, 69, 90 (was 44, 65, 86) -->
    <g clip-path="url(#calendar)">
      <rect x="22" y="46" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="44" y="46" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="66" y="46" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="88" y="46" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="22" y="67" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="44" y="67" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="66" y="67" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="88" y="67" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="22" y="88" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="44" y="88" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="66" y="88" width="18" height="14" rx="3" fill="#dbeafe"/>
      <rect x="88" y="88" width="18" height="14" rx="3" fill="#dbeafe"/>
    </g>

    <!--
      ECG: same QRS (Q39,R48,S58,J68). ST shortened 14→8 → T starts x=76.
      T wave compressed to 29px wide (was 35): peak at x=89, end at x=105.
      Flat x=105–130 → 8px visible in white, then fuses into blue frame on right.
      Left side: flat x=0–32 → 15px visible, same fusion effect.
      Deltas preserved: Q+11, R−23, S+24, T−14.
    -->
    <path d="M 0,72 L 32,72 L 39,83 L 48,49 L 58,96 L 68,72 L 76,72
             Q 83,72 89,58 Q 98,72 105,72 L 130,72"
          fill="none" stroke="#2563EB" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
