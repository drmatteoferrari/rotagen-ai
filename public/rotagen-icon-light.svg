<svg width="512" height="512" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- RotaGen Icon — Accent Blue — v14 final -->
  <!-- sparkle: curved 4-pt lens, dot trail. calendar: white body, #dbeafe cells, #2563EB ECG -->
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="130" height="130" rx="30"/>
    </clipPath>
    <clipPath id="cells">
      <rect x="7" y="40" width="116" height="83" rx="27"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- background -->
    <rect x="0" y="0" width="130" height="130" fill="#2563EB"/>
    <!-- curved 4-pt AI sparkle -->
    <path d="M93,10 C93.8,16 96.5,19 103,21 C96.5,23 93.8,26 93,32 C92.2,26 89.5,23 83,21 C89.5,19 92.2,16 93,10 Z" fill="white"/>
    <!-- dot trail fading left -->
    <circle cx="68" cy="21" r="4.5" fill="white" opacity="0.60"/>
    <circle cx="52" cy="21" r="3.5" fill="white" opacity="0.40"/>
    <circle cx="38" cy="21" r="2.5" fill="white" opacity="0.24"/>
    <circle cx="26" cy="21" r="1.8" fill="white" opacity="0.13"/>
    <!-- white calendar body -->
    <rect x="7" y="40" width="116" height="83" rx="27" fill="white"/>
    <!-- grid + ECG -->
    <g clip-path="url(#cells)">
      <rect x="18" y="56" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="43" y="56" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="68" y="56" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="93" y="56" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="18" y="75" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="43" y="75" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="68" y="75" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="93" y="75" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="18" y="94" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="43" y="94" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="68" y="94" width="19" height="13" rx="3" fill="#dbeafe"/>
      <rect x="93" y="94" width="19" height="13" rx="3" fill="#dbeafe"/>
      <path d="M12,82 L30,82 L36,93 L43,59 L51,106 L59,82 L75,82 Q82,82 88,68 Q94,82 103,82 L118,82"
            fill="none" stroke="#2563EB" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
